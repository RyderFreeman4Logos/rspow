name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true

      - name: Run CI script (fmt, clippy, tests)
        run: ./scripts/ci.sh

  feature-lanes:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: no-default-features
            cargo_args: "--no-default-features"
          - name: equix-only
            cargo_args: "--no-default-features --features equix"
          - name: equix-near-stateless
            cargo_args: "--no-default-features --features equix,near-stateless"
    name: test (${{ matrix.name }})
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true

      - name: "Test: ${{ matrix.name }}"
        run: cargo test ${{ matrix.cargo_args }}

  wasm32-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Add wasm32 target to pinned toolchain
        run: |
          rustup show
          rustup target add wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true

      - name: Check wasm32 baseline (no features)
        run: cargo check --target wasm32-unknown-unknown --no-default-features

      - name: Check wasm32 EquiX support
        if: ${{ always() }}
        run: cargo check --target wasm32-unknown-unknown --no-default-features --features equix

      - name: Check wasm32 near-stateless support
        if: ${{ always() }}
        run: cargo check --target wasm32-unknown-unknown --no-default-features --features near-stateless
